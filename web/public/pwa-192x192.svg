<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#4FC08D"/>
  <g transform="translate(96,100)" fill="white">
    <!-- Main pad -->
    <ellipse cx="0" cy="20" rx="28" ry="22"/>
    <!-- Top left toe -->
    <ellipse cx="-30" cy="-15" rx="14" ry="17" transform="rotate(-15,-30,-15)"/>
    <!-- Top right toe -->
    <ellipse cx="30" cy="-15" rx="14" ry="17" transform="rotate(15,30,-15)"/>
    <!-- Far left toe -->
    <ellipse cx="-48" cy="10" rx="12" ry="15" transform="rotate(-30,-48,10)"/>
    <!-- Far right toe -->
    <ellipse cx="48" cy="10" rx="12" ry="15" transform="rotate(30,48,10)"/>
