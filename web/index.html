<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/pwa-192x192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#4FC08D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PawStream" />
    <link rel="apple-touch-icon" href="/pwa-192x192.svg" />
    <title>PawStream - 宠物实时监控</title>
    
    <!-- Theme Pre-loader: Apply theme before Vue app loads to prevent white flash -->
    <script>
      (function() {
        // Get theme from localStorage
        var savedMode = localStorage.getItem('theme_mode');
        var mode = savedMode || 'auto';
        
        // Determine effective theme
        var theme = 'light';
        if (mode === 'dark') {
          theme = 'dark';
        } else if (mode === 'auto') {
          // Check system preference
          if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            theme = 'dark';
          }
        }
        
        // Apply theme class immediately
        if (theme === 'dark') {
          document.documentElement.classList.add('dark-theme');
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
